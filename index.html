<!-- index.html -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Manga Archive</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double+Ink:wght@100..900&family=Jersey+25&family=Pangolin&family=Press+Start+2P&display=swap" rel="stylesheet">

<!-- Exo/Magsrv loader (ONLY ONCE) -->
<script async type="application/javascript" src="https://a.magsrv.com/ad-provider.js"></script>

<style>
:root{
  --bg:#07070a;
  --ink:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.60);
  --stroke:rgba(255,255,255,.14);
  --radius:18px;
  --shadow:0 20px 60px rgba(0,0,0,.7);

  --railW:min(260px,22vw);
  --gap:18px;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  background:
    radial-gradient(900px 500px at 15% 0%, rgba(255,255,255,.06), transparent 60%),
    radial-gradient(800px 550px at 85% 15%, rgba(255,255,255,.05), transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

/* Titles / helper font */
.hero-title{
  font-family:"Bitcount Prop Double Ink", system-ui, sans-serif;
  font-weight:700;
  font-size:clamp(2.2rem,7vw,5rem);
  margin:0;
  letter-spacing:.5px;
  color:var(--ink);
}

.pangolin{
  font-family:"Pangolin", cursive;
  font-weight:400;
  font-style:normal;
  color:var(--ink);
}

.hero-sub,
.meta,
.nav a,
.doc,
.id,
.kbd,
.smallbtn,
.search input{
  font-family:"Pangolin", cursive;
  font-weight:400;
}

.hero{
  text-align:center;
  padding:44px 16px 18px;
  border-bottom:1px solid var(--stroke);
  background:linear-gradient(to bottom, rgba(255,255,255,.05), transparent 75%);
}

.hero-sub{ margin-top:10px; color:var(--muted); }

/* Toolbar */
.toolbar{
  max-width:1100px;
  margin:16px auto 0;
  padding:0 16px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
}

.search{
  width:min(760px, 100%);
  display:flex;
  gap:10px;
  align-items:center;
  padding:10px 12px;
  border-radius:999px;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,.05);
}

.search input{
  width:100%;
  background:transparent;
  border:0;
  outline:0;
  color:var(--ink);
  font-size:14px;
}

.kbd{
  font-size:12px;
  color:var(--muted);
  border:1px solid rgba(255,255,255,.18);
  padding:3px 8px;
  border-radius:999px;
}

.smallbtn{
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.06);
  color:var(--ink);
  padding:8px 12px;
  border-radius:999px;
  cursor:pointer;
  font-size:13px;
  transition:transform .12s ease, background .12s ease;
}
.smallbtn:hover{ background:rgba(255,255,255,.1); transform:translateY(-1px); }

.meta{
  color:var(--muted);
  font-size:12px;
  text-align:center;
  margin:10px 0 0;
}

/* Top banner */
.top-ad{
  max-width:1100px;
  margin:18px auto 0;
  padding:12px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.16);
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  backdrop-filter: blur(8px);
}
.top-ad .exo-slot{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:90px;
}

/* Layout */
.layout{
  display:grid;
  grid-template-columns:var(--railW) 1fr var(--railW);
  gap:var(--gap);
  max-width:1600px;
  margin:auto;
  padding:18px;
}
.center{ max-width:1100px; margin:auto; width:100%; }

/* Side rails */
.rail{ position:sticky; top:80px; height:calc(100vh - 100px); overflow:auto; padding-right:6px; }
.rail::-webkit-scrollbar{ width:10px; }
.rail::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.12); border-radius:999px; }
.rail-stack{ display:flex; flex-direction:column; gap:14px; }
.rail .exo-slot{
  min-height:250px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.03);
}

/* Cards */
details{
  margin:16px 0;
  border-radius:var(--radius);
  overflow:hidden;
  border:2px solid var(--stroke);
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
  box-shadow:var(--shadow);
  backdrop-filter: blur(8px);
}

summary{
  cursor:pointer;
  padding:16px 14px;
  display:grid;
  grid-template-columns: 1fr auto 210px; /* left | center | right */
  gap:14px;
  align-items:center;
}
summary::-webkit-details-marker{ display:none; }

.leftstack{ text-align:left; }
.doc{ font-size:16px; letter-spacing:.2px; line-height:1.15; }
.id{ font-size:12px; color:var(--muted); margin-top:6px; }

/* Center column = Expand */
.actions{ display:block; }
.action-expand{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* Right column = Open */
.action-open{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  justify-content:center;
  text-align:right;
}

/* Buttons */
.pill{
  background:rgba(255,255,255,.10);
  border:2px solid rgba(255,255,255,.14);
  padding:10px 14px;
  border-radius:999px;
  font-size:13px;
  text-decoration:none;
  color:white;
  white-space:nowrap;
  cursor:pointer;
  transition:transform .12s ease, background .12s ease;
}
.pill:hover{ background:rgba(255,255,255,.16); transform:translateY(-1px); }
.pill.primary{ background:rgba(255,255,255,.14); border-color:rgba(255,255,255,.18); }

.expand-btn{
  font-family:"Jersey 25", system-ui, sans-serif;
  letter-spacing:.6px;
  font-size:26px;
  padding:14px 18px;
  background:rgba(255,255,255,.18);
  border-color:rgba(255,255,255,.22);
}

.open-btn{
  font-size:16px;
  padding:12px 16px;
}

.expand-hint{
  margin-top:6px;
  font-size:12px;
  color:rgba(255,255,255,.72);
  line-height:1.2;
  font-family:"Pangolin", cursive;
  text-align:center;
}

.open-note{
  margin-top:6px;
  font-size:11px;
  color:var(--muted);
  line-height:1.2;
  font-family:"Pangolin", cursive;
  text-align:right;
}

/* Chevron */
.chev{
  display:inline-block;
  width:10px; height:10px;
  border-right:2px solid rgba(255,255,255,.7);
  border-bottom:2px solid rgba(255,255,255,.7);
  transform:rotate(-45deg);
  margin-left:10px;
  opacity:.85;
}
details[open] .chev{ transform:rotate(45deg); margin-top:-2px; }

.content{ background:#000; border-top:1px solid rgba(255,255,255,.10); }
iframe{ width:100%; height:85vh; border:0; }

/* Between ad block */
.between-ad{
  margin:14px 0;
  padding:14px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.35));
  box-shadow:0 18px 60px rgba(0,0,0,.45);
}
.between-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
  gap:14px;
  justify-items:center;
  align-items:center;
}
.between-grid .exo-slot{
  width:300px;
  min-height:250px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.03);
}

/* Footer mega ad block */
.end-ads{
  margin:18px 0 40px;
  padding:16px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(0,0,0,.35));
  box-shadow:0 18px 60px rgba(0,0,0,.45);
}
.end-ads-title{
  text-align:center;
  color:var(--muted);
  margin:0 0 12px;
  font-size:13px;
  font-family:"Pangolin", cursive;
}
.end-ads-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
  gap:14px;
  justify-content:center;
  justify-items:center;
}
.end-ads-grid .exo-slot{
  width:320px;
  min-height:200px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.03);
}

/* Nav */
.nav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  padding:12px;
  border-bottom:1px solid var(--stroke);
  justify-content:center;
}
.nav a{
  text-decoration:none;
  padding:6px 12px;
  background:rgba(255,255,255,.07);
  border-radius:999px;
  color:white;
  font-size:13px;
  font-family:"Pangolin", cursive;
}

@media(max-width:1100px){
  .layout{ grid-template-columns:1fr; }
  .rail{ position:relative; top:auto; height:auto; overflow:visible; padding-right:0; }
  .between-grid .exo-slot{ width:min(300px, 92vw); }
  .end-ads-grid .exo-slot{ width:min(320px, 92vw); }
}

/* Mobile: stack summary cleanly */
@media(max-width:600px){
  summary{
    grid-template-columns: 1fr;
    gap:10px;
    align-items:start;
  }
  .action-open{
    align-items:center;
    text-align:center;
  }
  .open-note{ text-align:center; }
}
</style>
</head>

<body>

<header class="hero">
  <h1 class="hero-title">Full Manga Series</h1>
  <p class="hero-sub">Search • Expand • Read</p>

  <div class="toolbar">
    <div class="search">
      <input id="q" type="search" placeholder="Search titles… e.g. Volume 1 Chapter 3" autocomplete="off" />
      <span class="kbd">Enter</span>
    </div>
    <button class="smallbtn" id="clear">Clear</button>
    <button class="smallbtn" id="openFirst">Open First</button>
  </div>

  <div class="meta" id="meta"></div>

  <!-- TOP BANNER ZONE (5865232) -->
  <div class="top-ad">
    <div class="exo-slot" data-zone="5865232"></div>
  </div>
</header>

<nav class="nav" id="nav" style="display:none;"></nav>

<div class="layout">
  <!-- LEFT STACK -->
  <aside class="rail">
    <div class="rail-stack" id="leftRail">
      <div class="exo-slot" data-zone="5865238" data-fallback="left"></div>
    </div>
  </aside>

  <main class="center">
    <div id="container"></div>
  </main>

  <!-- RIGHT STACK -->
  <aside class="rail">
    <div class="rail-stack" id="rightRail">
      <div class="exo-slot" data-zone="5865240" data-fallback="right"></div>
    </div>
  </aside>
</div>

<!-- Your popunder (5865234) - paste EXACT Exo script here -->
<script type="application/javascript">
/* paste your popunder block here exactly as Exo gave it */
</script>

<!-- Main app logic -->
<script defer src="index.js"></script>

</body>
</html>
