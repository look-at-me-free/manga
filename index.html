<!-- index.html -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manga Archive</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<!-- Exo/Magsrv loader (ONLY ONCE) -->
<script async type="application/javascript" src="https://a.magsrv.com/ad-provider.js"></script>

<style>
:root{
  --bg:#07070a;
  --ink:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.55);
  --stroke:rgba(255,255,255,.14);
  --radius:18px;
  --shadow:0 20px 60px rgba(0,0,0,.7);

  --railW:min(240px,22vw);
  --gap:18px;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  background:
    radial-gradient(900px 500px at 15% 0%, rgba(255,255,255,.06), transparent 60%),
    radial-gradient(800px 550px at 85% 15%, rgba(255,255,255,.05), transparent 55%),
    var(--bg);
  color:var(--ink);
  font-family:Inter,system-ui;
}

.hero{
  text-align:center;
  padding:44px 16px 18px;
  border-bottom:1px solid var(--stroke);
  background:linear-gradient(to bottom, rgba(255,255,255,.05), transparent 75%);
}

.hero-title{
  font-family:"Reggae One";
  font-size:clamp(2.2rem,7vw,5rem);
  margin:0;
  letter-spacing:.5px;
}

.hero-sub{ margin-top:8px; color:var(--muted); }

.toolbar{
  max-width:1100px;
  margin:16px auto 0;
  padding:0 16px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
}

.search{
  width:min(760px, 100%);
  display:flex;
  gap:10px;
  align-items:center;
  padding:10px 12px;
  border-radius:999px;
  border:1px solid var(--stroke);
  background:rgba(255,255,255,.05);
}

.search input{
  width:100%;
  background:transparent;
  border:0;
  outline:0;
  color:var(--ink);
  font-size:14px;
}

.kbd{
  font-size:12px;
  color:var(--muted);
  border:1px solid rgba(255,255,255,.18);
  padding:3px 8px;
  border-radius:999px;
}

.smallbtn{
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.06);
  color:var(--ink);
  padding:8px 12px;
  border-radius:999px;
  cursor:pointer;
  font-size:13px;
  transition:transform .12s ease, background .12s ease;
}
.smallbtn:hover{ background:rgba(255,255,255,.1); transform:translateY(-1px); }

.meta{ color:var(--muted); font-size:12px; text-align:center; margin:10px 0 0; }

/* Top banner “cool” look */
.top-ad{
  max-width:1100px;
  margin:18px auto 0;
  padding:12px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.16);
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
  box-shadow:0 18px 60px rgba(0,0,0,.55);
  backdrop-filter: blur(8px);
}
.top-ad .exo-slot{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:90px; /* helps banner render space */
}

/* Layout */
.layout{
  display:grid;
  grid-template-columns:var(--railW) 1fr var(--railW);
  gap:var(--gap);
  max-width:1500px;
  margin:auto;
  padding:18px;
}
.center{ max-width:1100px; margin:auto; width:100%; }

.rail{ position:sticky; top:80px; }
.rail .exo-slot{
  min-height:250px;
  border-radius:14px;
  overflow:hidden;
}

/* Cards */
details{
  margin:16px 0;
  border-radius:var(--radius);
  overflow:hidden;
  border:2px solid var(--stroke);
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
  box-shadow:var(--shadow);
  backdrop-filter: blur(8px);
}
summary{
  cursor:pointer;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
}
summary::-webkit-details-marker{ display:none; }

.leftstack{ text-align:left; }
.doc{ font-weight:800; letter-spacing:.3px; line-height:1.15; }
.id{ font-size:12px; color:var(--muted); font-family:monospace; margin-top:6px; }

.actions{ display:flex; gap:8px; align-items:center; }

.pill{
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.12);
  padding:7px 10px;
  border-radius:999px;
  font-size:12px;
  text-decoration:none;
  color:white;
  white-space:nowrap;
  transition:transform .12s ease, background .12s ease;
}
.pill:hover{ background:rgba(255,255,255,.16); transform:translateY(-1px); }
.pill.primary{ background:rgba(255,255,255,.14); border-color:rgba(255,255,255,.18); }

.chev{
  display:inline-block;
  width:10px; height:10px;
  border-right:2px solid rgba(255,255,255,.7);
  border-bottom:2px solid rgba(255,255,255,.7);
  transform:rotate(-45deg);
  margin-left:8px;
  opacity:.85;
}
details[open] .chev{ transform:rotate(45deg); margin-top:-2px; }

.content{ background:#000; border-top:1px solid rgba(255,255,255,.10); }
iframe{ width:100%; height:85vh; border:0; }

/* Between ad block: rectangular aesthetic */
.between-ad{
  margin:14px 0;
  padding:14px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.35));
  box-shadow:0 18px 60px rgba(0,0,0,.45);
}
.between-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
  gap:14px;
  justify-items:center;
  align-items:center;
}
.between-grid .exo-slot{
  width:300px;
  min-height:250px;
  border-radius:14px;
  overflow:hidden;
}

/* Nav */
.nav{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  padding:12px;
  border-bottom:1px solid var(--stroke);
  justify-content:center;
}
.nav a{
  text-decoration:none;
  padding:6px 12px;
  background:rgba(255,255,255,.07);
  border-radius:999px;
  color:white;
  font-size:13px;
}

@media(max-width:1100px){
  .layout{ grid-template-columns:1fr; }
  .rail{ position:relative; top:auto; }
  .between-grid .exo-slot{ width:min(300px, 92vw); }
}
</style>
</head>

<body>

<header class="hero">
  <h1 class="hero-title">Full Manga Series</h1>
  <p class="hero-sub">Search • Expand • Read</p>

  <div class="toolbar">
    <div class="search">
      <input id="q" type="search" placeholder="Search titles… e.g. dragon ball 12, dbz chapter 200…" autocomplete="off" />
      <span class="kbd">Enter</span>
    </div>
    <button class="smallbtn" id="clear">Clear</button>
    <button class="smallbtn" id="openFirst">Open First</button>
  </div>

  <div class="meta" id="meta"></div>

  <!-- TOP BANNER ZONE (5865232) -->
  <div class="top-ad">
    <div class="exo-slot" data-zone="5865232"></div>
  </div>
</header>

<nav class="nav" id="nav" style="display:none;"></nav>

<div class="layout">
  <!-- LEFT: Exo first, fallback later if no fill -->
  <aside class="rail">
    <div class="exo-slot" data-zone="5865238" data-fallback="left"></div>
  </aside>

  <main class="center">
    <div id="container"></div>
  </main>

  <!-- RIGHT: Exo first, fallback later if no fill -->
  <aside class="rail">
    <div class="exo-slot" data-zone="5865240" data-fallback="right"></div>
  </aside>
</div>

<!-- Your popunder (5865234) - keep your exact script -->
<script type="application/javascript">
/* paste your popunder block here exactly as Exo gave it */
</script>

<!-- Main app logic -->
<script defer src="index.js"></script>

</body>
</html>
