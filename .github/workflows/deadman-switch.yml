name: Deadman Switch

on:
  schedule:
    - cron: "0 23 * * *"   # runs daily at 23:00 UTC
  workflow_dispatch:
  push:
    paths:
      - "date.txt"
      - "placeholder.html"
      - "reveal.html"
      - ".github/workflows/deadman-switch.yml"

permissions:
  contents: write

concurrency:
  group: deadman-switch
  cancel-in-progress: false

jobs:
  swap-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decide which file should be live
        id: decide
        shell: bash
        run: |
          set -euo pipefail

          TARGET=""
          REASON=""

          if [ ! -f date.txt ]; then
            TARGET="reveal.html"
            REASON="date.txt missing"
          else
            RAW_DATE="$(tr -d '\r' < date.txt | xargs || true)"

            if [ -z "${RAW_DATE:-}" ]; then
              TARGET="reveal.html"
              REASON="date.txt empty"
            else
              FILE_TS="$(date -u -d "$RAW_DATE" +%s 2>/dev/null || true)"
              NOW_TS="$(date -u +%s)"
              DAYS=1
              LIMIT=$((DAYS * 24 * 60 * 60))

              if [ -z "${FILE_TS:-}" ]; then
                TARGET="reveal.html"
                REASON="date.txt invalid"
              else
                AGE=$((NOW_TS - FILE_TS))

                if [ "$AGE" -le "$LIMIT" ]; then
                  TARGET="placeholder.html"
                  REASON="date is fresh"
                else
                  TARGET="reveal.html"
                  REASON="date is stale"
                fi
              fi
            fi
          fi

          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

          echo "Chosen target: $TARGET ($REASON)"

      - name: Replace index.html
        shell: bash
        run: |
          set -euo pipefail

          TARGET="${{ steps.decide.outputs.target }}"

          if [ ! -f "$TARGET" ]; then
            echo "Target file '$TARGET' does not exist."
            exit 1
          fi

          cp "$TARGET" index.html

      - name: Commit and push only if index changed
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- index.html; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html
          git commit -m "Deadman switch: set index.html from ${{ steps.decide.outputs.target }} (${{ steps.decide.outputs.reason }})"
          git push
